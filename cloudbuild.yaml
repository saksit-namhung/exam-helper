steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/exam-helper:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/exam-helper:latest'
      - '.'

  # Step 2: Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/exam-helper'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'exam-helper'
      - '--image'
      - 'gcr.io/$PROJECT_ID/exam-helper:$COMMIT_SHA'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--max-instances'
      - '1'

images:
  - 'gcr.io/$PROJECT_ID/exam-helper:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/exam-helper:latest'

options:
  logging: CLOUD_LOGGING_ONLY
