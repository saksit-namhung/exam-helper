<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exam Practice</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">

<!-- ══════════════════════════════════════════════════════════════════════
     SCREEN: HOME — exam list
═══════════════════════════════════════════════════════════════════════ -->
<div id="screen-home" class="screen max-w-2xl mx-auto px-4 py-12">
  <div class="text-center mb-10">
    <div class="text-5xl mb-3">🎓</div>
    <h1 class="text-3xl font-bold text-gray-900">Exam Practice</h1>
    <p class="text-gray-500 mt-2">Select an exam to begin your session</p>
  </div>
  <div id="exam-list" class="flex flex-col gap-4">
    <p class="text-gray-400 text-center">Loading exams…</p>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════════════
     SCREEN: SETUP — session configuration
═══════════════════════════════════════════════════════════════════════ -->
<div id="screen-setup" class="screen hidden max-w-lg mx-auto px-4 py-12">
  <button onclick="App.goHome()" class="flex items-center gap-1 text-sm text-blue-600 hover:text-blue-800 mb-6">
    ← Back
  </button>

  <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
    <h2 id="setup-title" class="text-xl font-bold text-gray-900"></h2>
    <p id="setup-code" class="text-sm text-gray-500 mt-0.5 mb-6"></p>

    <!-- Session mode: by count OR by range -->
    <div class="mb-6 space-y-2">

      <!-- Card 1: Number of questions (slider) + order -->
      <label id="label-mode-count"
        class="flex items-start gap-3 p-4 rounded-xl border-2 cursor-pointer transition-colors border-blue-400 bg-blue-50">
        <input type="radio" name="session-mode" id="mode-count" value="count" checked
          class="mt-1 w-4 h-4 accent-blue-600 flex-shrink-0" />
        <div class="flex-1 min-w-0">
          <span class="text-sm font-medium text-gray-700 block mb-2">
            Number of questions
            <span class="text-gray-400 font-normal text-xs">(max <span id="count-max">&#8212;</span>)</span>
          </span>
          <div class="flex items-center gap-4 mb-4">
            <input id="setup-count" type="range" min="1" max="10" value="10"
              class="flex-1 accent-blue-600" />
            <span id="count-display" class="w-10 text-center font-bold text-blue-600 text-lg">10</span>
          </div>
          <div class="pt-3 border-t border-blue-100">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" id="setup-shuffle" checked
                class="w-4 h-4 accent-blue-600 rounded" />
              <span class="text-sm text-gray-700">Shuffle questions</span>
            </label>
          </div>
        </div>
      </label>

      <!-- Card 2: Question range (sequential only) -->
      <label id="label-mode-range"
        class="flex items-start gap-3 p-4 rounded-xl border-2 cursor-pointer transition-colors border-gray-200 bg-white">
        <input type="radio" name="session-mode" id="mode-range" value="range"
          class="mt-1 w-4 h-4 accent-blue-600 flex-shrink-0" />
        <div class="flex-1 min-w-0">
          <div class="flex items-center justify-between mb-3">
            <span class="text-sm font-medium text-gray-700">Question range</span>
            <span class="text-xs text-gray-400">Total: <span id="range-total" class="font-medium text-gray-600">&#8212;</span></span>
          </div>
          <div class="flex items-center gap-3">
            <div class="flex-1">
              <span class="text-xs text-gray-500 mb-1 block">From Q</span>
              <input id="range-start" type="number" min="1" value="1"
                class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 text-sm bg-white
                       focus:border-blue-400 focus:outline-none" />
            </div>
            <span class="text-gray-300 font-bold mt-5">&#8212;</span>
            <div class="flex-1">
              <span class="text-xs text-gray-500 mb-1 block">To Q</span>
              <input id="range-end" type="number" min="1" value="100"
                class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 text-sm bg-white
                       focus:border-blue-400 focus:outline-none" />
            </div>
          </div>
          <div id="range-error" class="hidden mt-2">
            <span class="text-xs text-red-500">&#9888; <span id="range-error-msg"></span></span>
          </div>
          <p class="text-xs text-gray-400 mt-2 mb-3">
            <span id="range-size-label" class="text-gray-500 font-medium">&#8212;</span> questions in range
          </p>
          <div class="pt-3 border-t border-gray-100">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" id="range-shuffle" checked
                class="w-4 h-4 accent-blue-600 rounded" />
              <span class="text-sm text-gray-700">Shuffle questions</span>
            </label>
          </div>
        </div>
      </label>

    </div>

    <button id="btn-start"
      class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition-colors">
      Start Exam →
    </button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════════════
     SCREEN: QUESTION
═══════════════════════════════════════════════════════════════════════ -->
<div id="screen-question" class="screen hidden max-w-2xl mx-auto px-4 py-8">

  <!-- Top nav: Setup + Previous -->
  <div class="flex items-center justify-between mb-4">
    <button onclick="App.goToSetup()" class="text-sm text-gray-400 hover:text-gray-700 transition-colors">← Setup</button>
    <button id="btn-prev" onclick="App.handleBack()" class="hidden text-sm text-blue-500 hover:text-blue-700 transition-colors">← Previous</button>
  </div>

  <!-- Progress header -->
  <div class="flex items-center justify-between mb-2">
    <span id="q-num" class="text-sm font-medium text-gray-500"></span>
    <span id="q-progress-text" class="text-sm font-medium text-blue-600"></span>
  </div>
  <div class="w-full bg-gray-200 rounded-full h-2 mb-6">
    <div id="q-progress" class="progress-fill bg-blue-500 h-2 rounded-full" style="width:0%"></div>
  </div>

  <!-- Question card -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 md:p-8">
    <div class="flex items-center justify-between mb-4">
      <span id="q-type-badge" class="inline-block px-3 py-1 rounded-full text-xs font-semibold"></span>
      <button id="q-actual-num"
        title="Click to reveal question number"
        class="text-xs text-gray-400 font-mono bg-gray-100 px-2 py-1 rounded-md
               cursor-pointer select-none hover:bg-gray-200 transition-colors tracking-widest">
        Q•••
      </button>
    </div>
    <p id="q-text" class="text-gray-800 text-base leading-relaxed mb-6 whitespace-pre-wrap"></p>
    <div id="q-inputs" class="flex flex-col gap-3"></div>
  </div>

  <div class="flex justify-end mt-5">
    <button id="btn-next"
      class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-8 py-3 rounded-xl transition-colors">
      Next →
    </button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════════════
     SCREEN: FEEDBACK — per-question result
═══════════════════════════════════════════════════════════════════════ -->
<div id="screen-feedback" class="screen hidden max-w-2xl mx-auto px-4 py-8">
  <div class="flex items-center justify-between mb-4">
    <span id="fb-actual-num" class="text-xs text-gray-400 font-mono bg-gray-100 px-2 py-1 rounded-md"></span>
    <span id="fb-num" class="text-sm text-gray-400"></span>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 md:p-8">

    <!-- Status banner -->
    <div id="fb-status" class="text-2xl font-bold mb-5"></div>

    <!-- Question recap -->
    <div class="text-sm text-gray-500 uppercase tracking-wide font-semibold mb-1">Question</div>
    <p id="fb-question" class="text-gray-700 text-sm leading-relaxed mb-5 whitespace-pre-wrap"></p>

    <!-- All choices colour-coded: green=correct, red=wrong pick, gray=not relevant -->
    <div class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">All Choices</div>
    <div id="fb-all-choices" class="mb-5"></div>

    <!-- Matching comparison table (shown only for matching questions) -->
    <div id="fb-match-table" class="hidden mb-5 overflow-x-auto">
      <table class="w-full text-sm border-collapse">
        <thead>
          <tr class="bg-gray-100 text-gray-600 text-xs uppercase tracking-wide">
            <th class="text-left px-3 py-2 rounded-tl-lg">Statement</th>
            <th class="text-left px-3 py-2">Your Answer</th>
            <th class="text-left px-3 py-2">Correct</th>
            <th class="px-3 py-2 rounded-tr-lg"></th>
          </tr>
        </thead>
        <tbody id="fb-match-rows"></tbody>
      </table>
    </div>

    <!-- Explanation -->
    <div id="fb-explanation" class="hidden">
      <div class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Explanation</div>
      <div class="explanation-box bg-blue-50 border border-blue-100 rounded-xl p-4 text-sm text-gray-700 leading-relaxed"></div>
    </div>
  </div>

  <div class="flex items-center justify-between mt-5">
    <button onclick="App.handleRevise()"
      class="text-sm text-blue-500 hover:text-blue-700 transition-colors">
      ← Revise Answer
    </button>
    <button id="btn-continue"
      class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-8 py-3 rounded-xl transition-colors">
      Continue →
    </button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════════════
     SCREEN: SUMMARY — end-of-session results
═══════════════════════════════════════════════════════════════════════ -->
<div id="screen-summary" class="screen hidden max-w-lg mx-auto px-4 py-12 text-center">
  <div class="text-5xl mb-4">📊</div>
  <h2 class="text-2xl font-bold text-gray-900 mb-2">
    <span id="sum-mode-label">Exam Complete!</span>
  </h2>
  <p class="text-gray-500 mb-8" id="sum-exam-name"></p>

  <!-- Score ring -->
  <div class="flex justify-center mb-8">
    <div id="sum-score-ring" class="score-ring">
      <span id="sum-score">—</span>
    </div>
  </div>

  <!-- Stats grid -->
  <div class="grid grid-cols-3 gap-4 mb-10">
    <div class="bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
      <div class="text-2xl font-bold text-gray-800" id="sum-total">—</div>
      <div class="text-xs text-gray-400 mt-1">Total</div>
    </div>
    <div class="bg-green-50 rounded-xl border border-green-200 p-4 shadow-sm">
      <div class="text-2xl font-bold text-green-600" id="sum-correct">—</div>
      <div class="text-xs text-gray-400 mt-1">Correct</div>
    </div>
    <div class="bg-red-50 rounded-xl border border-red-200 p-4 shadow-sm">
      <div class="text-2xl font-bold text-red-500" id="sum-incorrect">—</div>
      <div class="text-xs text-gray-400 mt-1">Incorrect</div>
    </div>
  </div>

  <div class="flex flex-col sm:flex-row gap-3 justify-center">
    <button id="btn-retry" class="hidden bg-amber-500 hover:bg-amber-600 text-white font-semibold px-6 py-3 rounded-xl transition-colors">
      Retry Incorrect
    </button>
    <button id="btn-new-session" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-3 rounded-xl transition-colors">
      New Session
    </button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════════════
     SCREEN: BROWSE — paginated question list
═══════════════════════════════════════════════════════════════════════ -->
<div id="screen-browse" class="screen hidden max-w-2xl mx-auto px-4 py-8">

  <!-- Back + exam name -->
  <div class="flex items-center justify-between mb-5">
    <button onclick="App.goHome()"
      class="text-sm text-blue-600 hover:text-blue-800 transition-colors">
      &#8592; Back to Exams
    </button>
    <div class="text-right">
      <div id="browse-title" class="font-semibold text-gray-900 text-sm"></div>
      <div id="browse-code" class="text-xs text-gray-400"></div>
    </div>
  </div>

  <!-- Title row + pagination controls at top right -->
  <div class="flex items-center justify-between gap-3 mb-4 flex-wrap">
    <h2 class="text-lg font-bold text-gray-800 flex-shrink-0">Browse Questions</h2>
    <div class="flex items-center gap-2 flex-wrap justify-end">
      <span id="browse-info" class="text-xs text-gray-400"></span>
      <!-- Per-page selector -->
      <select id="browse-page-size"
        onchange="App.browseChangePageSize()"
        class="text-xs border border-gray-200 rounded-lg px-2 py-1.5 bg-white text-gray-600
               focus:outline-none focus:border-blue-400 cursor-pointer">
        <option value="10">10 / page</option>
        <option value="25" selected>25 / page</option>
        <option value="50">50 / page</option>
        <option value="100">100 / page</option>
      </select>
      <!-- Prev / page input / total / Next -->
      <div class="flex items-center gap-1">
        <button id="browse-prev" onclick="App.browsePrev()"
          class="px-2.5 py-1.5 rounded-lg border border-gray-200 text-sm text-gray-600
                 hover:border-blue-300 hover:text-blue-600 disabled:opacity-40
                 disabled:cursor-not-allowed transition-colors">&#8592;</button>
        <input id="browse-page-jump" type="number" min="1" value="1"
          onchange="App.browseJumpPage()"
          class="w-12 text-center text-xs border border-gray-200 rounded-lg px-1 py-1.5
                 focus:outline-none focus:border-blue-400" />
        <span id="browse-pages-total" class="text-xs text-gray-400 whitespace-nowrap">/ &#8212;</span>
        <button id="browse-next" onclick="App.browseNext()"
          class="px-2.5 py-1.5 rounded-lg border border-gray-200 text-sm text-gray-600
                 hover:border-blue-300 hover:text-blue-600 disabled:opacity-40
                 disabled:cursor-not-allowed transition-colors">&#8594;</button>
      </div>
    </div>
  </div>

  <div id="browse-list" class="flex flex-col gap-2"></div>
</div>

<!-- ══════════════════════════════════════════════════════════════════════
     SCREEN: DETAIL — single question view
═══════════════════════════════════════════════════════════════════════ -->
<div id="screen-detail" class="screen hidden max-w-2xl mx-auto px-4 py-8">
  <div class="flex items-center justify-between mb-4">
    <button onclick="App.goToBrowse()"
      class="text-sm text-blue-600 hover:text-blue-800 transition-colors">
      &#8592; Browse
    </button>
    <div class="flex items-center gap-3">
      <span id="detail-count" class="text-xs text-gray-400"></span>
      <span id="detail-qnum" class="text-xs text-gray-500 font-mono bg-gray-100 px-2 py-1 rounded-md"></span>
    </div>
  </div>

  <div class="flex items-center justify-between mb-5">
    <button id="detail-prev" onclick="App.detailPrev()"
      class="text-sm text-gray-500 hover:text-blue-600 disabled:opacity-30
             disabled:cursor-not-allowed transition-colors">&#8592; Prev</button>
    <span id="detail-type-badge" class="inline-block px-3 py-1 rounded-full text-xs font-semibold"></span>
    <button id="detail-next" onclick="App.detailNext()"
      class="text-sm text-gray-500 hover:text-blue-600 disabled:opacity-30
             disabled:cursor-not-allowed transition-colors">Next &#8594;</button>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 md:p-8 mb-4">
    <p id="detail-question"
       class="text-gray-800 text-base leading-relaxed mb-6 whitespace-pre-wrap"></p>

    <div class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Answer Choices</div>
    <div id="detail-choices" class="mb-5"></div>

    <div id="detail-answer-section" class="hidden">
      <div class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Correct Answer</div>
      <div id="detail-answer"
        class="bg-green-50 border border-green-200 rounded-xl p-4 text-sm text-gray-700 leading-relaxed"></div>
    </div>
  </div>

  <div id="detail-explanation" class="hidden bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
    <div class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Explanation</div>
    <div class="explanation-box bg-blue-50 border border-blue-100 rounded-xl p-4 text-sm text-gray-700 leading-relaxed"></div>
  </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
